spring.application.name=hirewise-backend

# ======================================================
# DATABASE CONFIGURATION (MySQL)
# ======================================================
spring.datasource.url=jdbc:mysql://localhost:3306/hirewise_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Nilesh@7
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================================================
# JPA / HIBERNATE CONFIGURATION
# ======================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ======================================================
# LOGGING CONFIGURATION
# ======================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# ======================================================
# SERVER CONFIGURATION
# ======================================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ======================================================
# JWT CONFIGURATION - FIXED (512 bits - 64+ characters)
# ======================================================
jwt.secret=HireWiseSolutionsPvtLtdPuneIndiaRecruitmentPortalBackendJWTSecretKey2026Secure512BitsLengthExtraLongForSafety
jwt.expiration=86400000

# ======================================================
# FILE UPLOAD CONFIGURATION
# ======================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ======================================================
# PRODUCTION ENVIRONMENT VARIABLES
# Railway/AWS will provide these values automatically
# ======================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}